# Azure App Service(3D-mindpalace-AI) 자동 배포
#  push(main) → 프론트 빌드(Vite) → 백엔드+dist+legacy 패키징 → 웹앱 배포
#  필요 시크릿: AZURE_WEBAPP_PUBLISH_PROFILE (포털 '게시 프로필 다운로드' 내용)
name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (Vite)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble package
        run: |
          mkdir -p package/frontend
          cp -r backend package/
          cp -r frontend/dist package/frontend/dist
          if [ -d frontend/public ]; then
            cp -r frontend/public package/frontend/public
          elif [ -d frontend/dist/legacy ]; then
            mkdir -p package/frontend/public
            cp -r frontend/dist/legacy package/frontend/public/legacy
          else
            echo "::error::Neither frontend/public nor frontend/dist/legacy exists. Legacy files were not uploaded to the repository."
            find frontend -maxdepth 3 -type d | sort
            exit 1
          fi
          cp requirements.txt startup.sh package/
          # legacy/public/data 에 cities가 있으면 legacy/data 로 정규화(vworld_map은 legacy/data 사용)
          if [ ! -f package/frontend/public/legacy/data/cities.json ] && [ -f package/frontend/public/legacy/public/data/cities.json ]; then
            echo "Normalizing nested legacy/public/data into legacy/data"
            mkdir -p package/frontend/public/legacy/data
            cp -r package/frontend/public/legacy/public/data/. package/frontend/public/legacy/data/
          fi
          # cities 데이터(vworld_map용)는 아직 준비 중일 수 있음 → 없어도 배포는 진행(실패 대신 경고).
          if [ -f package/frontend/public/legacy/data/cities.json ] && [ -d package/frontend/public/legacy/data/cities ]; then
            echo "Packaged city files: $(find package/frontend/public/legacy/data/cities -name '*.json' | wc -l)"
          else
            echo "::warning::cities 데이터(legacy/data/cities.json, data/cities/) 미존재 — vworld_map 도시데이터 없이 배포(나머지 페이지는 정상)."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies into package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --target package/.python_packages/lib/site-packages -r requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 3D-mindpalace-AI
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6283BC0F839B4A74A41ED2DE019F96AA }}
          package: package
